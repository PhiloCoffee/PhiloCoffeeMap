<svg width="96" height="96" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Folded map with dog-ear top-right, fold lines, and pin -->
  <path d="M3 4 L17 4 L21 8 L21 20 L3 20 Z"
    stroke="#2C1810" stroke-width="1.6" fill="none" stroke-linejoin="round"/>
  <!-- Dog-ear fold -->
  <path d="M17 4 L17 8 L21 8"
    stroke="#2C1810" stroke-width="1.3" fill="none" stroke-linejoin="round" opacity="0.6"/>
  <!-- Vertical fold lines -->
  <line x1="10" y1="4" x2="10" y2="20" stroke="#2C1810" stroke-width="1.1" opacity="0.3"/>
  <line x1="15" y1="8" x2="15" y2="20" stroke="#2C1810" stroke-width="1.1" opacity="0.3"/>
  <!-- Pin -->
  <circle cx="6.5" cy="11" r="1.8" fill="#2C1810"/>
  <line x1="6.5" y1="12.8" x2="6.5" y2="16" stroke="#2C1810" stroke-width="1.3" stroke-linecap="round"/>
</svg>
